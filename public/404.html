<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0;url=/" />
    <title>Генератор смет Аверс</title>
    <script>
      // GitHub Pages SPA fallback — redirect to hash router
      var segment = window.location.pathname.split('/').pop() || '';
      if (segment && segment !== 'index.html') {
        window.location.replace('/avers-sales-doc/#' + segment);
      } else {
        window.location.replace('/avers-sales-doc/');
      }
    </script>
  </head>

</html>
